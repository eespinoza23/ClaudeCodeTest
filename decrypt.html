<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Decryption</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea, input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }

        textarea:focus, input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }

        .result.success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            display: block;
        }

        .result.error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            display: block;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .result.success .result-title {
            color: #15803d;
        }

        .result.error .result-title {
            color: #991b1b;
        }

        .result-data {
            background: white;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            margin-top: 8px;
            word-break: break-all;
        }

        .result.success .result-data {
            color: #166534;
        }

        .result.error .result-data {
            color: #7f1d1d;
        }

        .info {
            background: #f3f4f6;
            border-left: 4px solid #3b82f6;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #374151;
            margin-bottom: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 QR Decryption</h1>
        <p class="subtitle">Scan QR code and paste encrypted data below</p>

        <div class="info">
            ℹ️ This tool decrypts data client-side in your browser. No data is sent anywhere.
        </div>

        <form id="decryptForm">
            <div class="form-group">
                <label for="encryptedData">Encrypted Data (from QR code)</label>
                <textarea id="encryptedData" placeholder="Paste the scanned QR code data here..." required></textarea>
            </div>

            <div class="form-group">
                <label for="password">Master Password</label>
                <input type="password" id="password" placeholder="Enter the master password..." required>
            </div>

            <button type="submit">Decrypt</button>
            <div class="loading" id="loading">Decrypting...</div>
        </form>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle">Decrypted Information</div>
            <div class="result-data" id="resultData"></div>
        </div>
    </div>

    <script>
        // Inline encryption/decryption using Web Crypto API

        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveBits', 'deriveKey']
            );

            return crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                baseKey,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
        }

        async function decryptData(encryptedBase64, password) {
            try {
                // Decode base64
                const binaryString = atob(encryptedBase64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Extract components
                const salt = bytes.slice(0, 16);
                const nonce = bytes.slice(16, 28);
                const ciphertext = bytes.slice(28);

                // Derive key
                const key = await deriveKey(password, salt);

                // Decrypt
                const plaintext = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: nonce },
                    key,
                    ciphertext
                );

                // Decode to string
                const dec = new TextDecoder();
                return dec.decode(plaintext);

            } catch (error) {
                throw new Error('Decryption failed - wrong password or corrupted data');
            }
        }

        function parseDecryptedData(plaintext) {
            // Expected format: "Full Name | Food Restrictions"
            const parts = plaintext.split('|').map(p => p.trim());

            if (parts.length !== 2) {
                throw new Error('Invalid data format');
            }

            return {
                name: parts[0],
                restrictions: parts[1]
            };
        }

        document.getElementById('decryptForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const encryptedData = document.getElementById('encryptedData').value.trim();
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');

            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';

            try {
                const plaintext = await decryptData(encryptedData, password);
                const data = parseDecryptedData(plaintext);

                resultDiv.className = 'result success';
                document.getElementById('resultTitle').textContent = '✓ Decrypted Successfully';
                document.getElementById('resultData').innerHTML = `
                    <strong>Name:</strong> ${escapeHtml(data.name)}<br>
                    <strong>Food Restrictions:</strong> ${escapeHtml(data.restrictions)}
                `;
                resultDiv.style.display = 'block';

            } catch (error) {
                resultDiv.className = 'result error';
                document.getElementById('resultTitle').textContent = '✗ Decryption Failed';
                document.getElementById('resultData').textContent = error.message;
                resultDiv.style.display = 'block';

            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
