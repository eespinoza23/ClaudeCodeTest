<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SURVIVOR - Top-Down Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    display: block;
    cursor: crosshair;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;
ctx.imageSmoothingEnabled = false;

// ── Game State ──────────────────────────────────────────────────────────────
const STATE = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3, VICTORY: 4, PAUSED: 5 };
let state = STATE.MENU;
let score = 0;
let currentLevel = 1;
let levelSplashTimer = 0;
let flashTimer = 0;
let pausedState = null;
let highScore = 0;

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: 400, y: 300, down: false };
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Escape') {
    if (state === STATE.PLAYING) { pausedState = state; state = STATE.PAUSED; }
    else if (state === STATE.PAUSED) { state = pausedState; }
  }
});
window.addEventListener('keyup', e => keys[e.key] = false);
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
  mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
});
canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  if (state === STATE.MENU) startGame();
  if (state === STATE.GAME_OVER || state === STATE.VICTORY) { state = STATE.MENU; initMenu(); }
});
canvas.addEventListener('mouseup', () => mouse.down = false);

// ── Level Config ─────────────────────────────────────────────────────────────
const LEVELS = [
  null, // 1-indexed
  { enemyCount: 10, types: ['grunt'],                    spawnRate: 2.5, speedMult: 1.0 },
  { enemyCount: 18, types: ['grunt','charger'],          spawnRate: 2.0, speedMult: 1.1 },
  { enemyCount: 25, types: ['grunt','charger','tank'],   spawnRate: 1.7, speedMult: 1.2 },
  { enemyCount: 35, types: ['grunt','charger','tank'],   spawnRate: 1.4, speedMult: 1.4 },
  { enemyCount: 50, types: ['grunt','charger','tank'],   spawnRate: 1.0, speedMult: 1.6 },
];

const ENEMY_DEFS = {
  grunt:   { radius: 14, speed: 60,  hp: 1, score: 10,  color: '#cc2222', colorDark: '#881111' },
  charger: { radius: 12, speed: 110, hp: 2, score: 25,  color: '#ff8800', colorDark: '#aa5500' },
  tank:    { radius: 22, speed: 35,  hp: 5, score: 60,  color: '#8833cc', colorDark: '#551188' },
};

// ── Game Objects ─────────────────────────────────────────────────────────────
let player, bullets, enemies, particles, menuEnemies;
let spawnTimer = 0, enemiesToSpawn = 0, enemiesSpawned = 0;
let fireCooldown = 0;

function initMenu() {
  menuEnemies = [];
  for (let i = 0; i < 8; i++) {
    menuEnemies.push({
      x: Math.random() * 800, y: Math.random() * 600,
      angle: Math.random() * Math.PI * 2,
      type: ['grunt','charger','tank'][Math.floor(Math.random() * 3)],
      anim: Math.random() * Math.PI * 2,
      speed: 30 + Math.random() * 20,
    });
  }
}

function startGame() {
  score = 0;
  currentLevel = 1;
  state = STATE.PLAYING;
  initLevel();
}

function initLevel() {
  const lvl = LEVELS[currentLevel];
  player = {
    x: 400, y: 300, radius: 14,
    hp: 3, maxHp: 3,
    speed: 160,
    angle: 0,
    legAnim: 0, legSpeed: 0,
    iFrames: 0, // invincibility frames after hit
  };
  bullets = [];
  enemies = [];
  particles = [];
  spawnTimer = 0;
  enemiesToSpawn = lvl.enemyCount;
  enemiesSpawned = 0;
  fireCooldown = 0;
}

// ── Spawning ──────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const lvl = LEVELS[currentLevel];
  const type = lvl.types[Math.floor(Math.random() * lvl.types.length)];
  const def = ENEMY_DEFS[type];
  let x, y;
  const edge = Math.floor(Math.random() * 4);
  const pad = 30;
  if (edge === 0) { x = Math.random() * 800; y = -pad; }
  else if (edge === 1) { x = 800 + pad; y = Math.random() * 600; }
  else if (edge === 2) { x = Math.random() * 800; y = 600 + pad; }
  else { x = -pad; y = Math.random() * 600; }
  enemies.push({
    x, y, type, radius: def.radius,
    hp: def.hp, maxHp: def.hp,
    anim: Math.random() * Math.PI * 2,
    speed: def.speed * lvl.speedMult,
    hitFlash: 0,
    dying: false,
  });
  enemiesSpawned++;
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 60 + Math.random() * 120;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1.0, decay: 0.8 + Math.random() * 0.6,
      radius: 2 + Math.random() * 3, color,
    });
  }
}

// ── Drawing Helpers ───────────────────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const sz = 40;
  for (let x = 0; x < 800; x += sz) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke(); }
  for (let y = 0; y < 600; y += sz) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(800, y); ctx.stroke(); }
}

function drawShadow(x, y, rx, ry) {
  ctx.save();
  ctx.translate(x, y + ry * 0.4);
  ctx.scale(1, 0.4);
  ctx.beginPath();
  ctx.arc(0, 0, rx, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();
  ctx.restore();
}

function drawPlayer(p) {
  const ax = mouse.x - p.x, ay = mouse.y - p.y;
  p.angle = Math.atan2(ay, ax);

  ctx.save();
  ctx.translate(p.x, p.y);

  // Shadow
  drawShadow(0, 0, p.radius, p.radius);

  // Legs (two rects, offset by sin)
  const legOff = Math.sin(p.legAnim) * 5;
  const perpX = Math.cos(p.angle + Math.PI / 2);
  const perpY = Math.sin(p.angle + Math.PI / 2);
  const backX = Math.cos(p.angle + Math.PI) * 6;
  const backY = Math.sin(p.angle + Math.PI) * 6;

  ctx.fillStyle = p.iFrames > 0 && Math.floor(p.iFrames * 10) % 2 === 0 ? 'rgba(150,255,150,0.6)' : '#1a6b1a';
  // Left leg
  ctx.save();
  ctx.translate(backX + perpX * 7 + perpX * legOff * 0.3, backY + perpY * 7 + perpY * legOff * 0.3);
  ctx.rotate(p.angle);
  ctx.fillRect(-8, -3, 16, 6);
  ctx.restore();
  // Right leg
  ctx.save();
  ctx.translate(backX - perpX * 7 - perpX * legOff * 0.3, backY - perpY * 7 - perpY * legOff * 0.3);
  ctx.rotate(p.angle);
  ctx.fillRect(-8, -3, 16, 6);
  ctx.restore();

  // Body circle
  const bodyColor = p.iFrames > 0 && Math.floor(p.iFrames * 10) % 2 === 0 ? '#aaffaa' : '#2d8b2d';
  ctx.beginPath();
  ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
  ctx.fillStyle = bodyColor;
  ctx.fill();
  ctx.strokeStyle = '#1a5c1a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Gun arm (rotates with aim)
  ctx.save();
  ctx.rotate(p.angle);
  ctx.fillStyle = '#888';
  ctx.fillRect(6, -3, 16, 6);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(14, -2, 10, 4);
  ctx.restore();

  ctx.restore();
}

function drawEnemy(e) {
  const def = ENEMY_DEFS[e.type];
  e.anim += 0.05;
  const pulse = 1 + Math.sin(e.anim) * 0.06;

  ctx.save();
  ctx.translate(e.x, e.y);

  drawShadow(0, 0, e.radius * pulse, e.radius * pulse);

  ctx.scale(pulse, pulse);

  // Hit flash overlay
  const flashAlpha = e.hitFlash > 0 ? e.hitFlash : 0;

  if (e.type === 'charger') {
    // Elongated oval pointing toward player
    const dx = player.x - e.x, dy = player.y - e.y;
    const angle = Math.atan2(dy, dx);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, 0, e.radius * 1.5, e.radius * 0.7, 0, 0, Math.PI * 2);
    ctx.fillStyle = flashAlpha > 0 ? lerpColor(def.color, '#ffffff', flashAlpha) : def.color;
    ctx.fill();
    ctx.strokeStyle = def.colorDark;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Speed lines
    ctx.strokeStyle = 'rgba(255,200,100,0.4)';
    ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(-e.radius * 1.5, i * 5);
      ctx.lineTo(-e.radius * 2.5, i * 5);
      ctx.stroke();
    }
  } else if (e.type === 'tank') {
    // Large circle with rings
    ctx.beginPath();
    ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
    ctx.fillStyle = flashAlpha > 0 ? lerpColor(def.color, '#ffffff', flashAlpha) : def.color;
    ctx.fill();
    ctx.strokeStyle = def.colorDark;
    ctx.lineWidth = 3;
    ctx.stroke();
    // Inner ring
    ctx.beginPath();
    ctx.arc(0, 0, e.radius * 0.6, 0, Math.PI * 2);
    ctx.strokeStyle = def.colorDark;
    ctx.lineWidth = 2;
    ctx.stroke();
    // HP bar under enemy
    const hpFrac = e.hp / e.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(-e.radius, e.radius + 4, e.radius * 2, 4);
    ctx.fillStyle = hpFrac > 0.5 ? '#00cc44' : hpFrac > 0.25 ? '#ffaa00' : '#ff2200';
    ctx.fillRect(-e.radius, e.radius + 4, e.radius * 2 * hpFrac, 4);
  } else {
    // Grunt - basic circle
    ctx.beginPath();
    ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
    ctx.fillStyle = flashAlpha > 0 ? lerpColor(def.color, '#ffffff', flashAlpha) : def.color;
    ctx.fill();
    ctx.strokeStyle = def.colorDark;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Eyes (face player)
  const dx = player.x - e.x, dy = player.y - e.y;
  const eyeAngle = Math.atan2(dy, dx);
  const ex = Math.cos(eyeAngle) * e.radius * 0.45;
  const ey = Math.sin(eyeAngle) * e.radius * 0.45;
  const perpEX = Math.cos(eyeAngle + Math.PI / 2) * e.radius * 0.25;
  const perpEY = Math.sin(eyeAngle + Math.PI / 2) * e.radius * 0.25;
  const eyeR = e.type === 'tank' ? 4 : 3;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex + perpEX, ey + perpEY, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex - perpEX, ey - perpEY, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(ex + perpEX + Math.cos(eyeAngle), ey + perpEY + Math.sin(eyeAngle), eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex - perpEX + Math.cos(eyeAngle), ey - perpEY + Math.sin(eyeAngle), eyeR * 0.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawBullet(b) {
  // Trail
  for (let i = 0; i < b.trail.length; i++) {
    const alpha = (i / b.trail.length) * 0.5;
    ctx.beginPath();
    ctx.arc(b.trail[i].x, b.trail[i].y, b.radius * (i / b.trail.length), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,100,${alpha})`;
    ctx.fill();
  }
  // Main bullet
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#ffee44';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  // Glow
  const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius * 3);
  grd.addColorStop(0, 'rgba(255,240,100,0.4)');
  grd.addColorStop(1, 'rgba(255,240,100,0)');
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius * 3, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();
}

function drawHUD() {
  const lvl = LEVELS[currentLevel];
  // Top bar background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 800, 40);

  // Level
  ctx.fillStyle = '#88ff88';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('LEVEL ' + currentLevel, 12, 26);

  // Score
  ctx.fillStyle = '#ffff88';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score, 400, 26);

  // Enemies remaining
  const remaining = enemiesToSpawn - enemiesSpawned + enemies.length;
  ctx.fillStyle = '#ff8844';
  ctx.textAlign = 'center';
  ctx.fillText('ENEMIES: ' + remaining, 560, 26);

  // Health hearts
  ctx.textAlign = 'right';
  for (let i = 0; i < player.maxHp; i++) {
    ctx.fillStyle = i < player.hp ? '#ff3344' : '#442222';
    ctx.font = '20px monospace';
    ctx.fillText('♥', 788 - i * 26, 26);
  }
}

function drawHUDMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 800, 40);
  ctx.fillStyle = '#88ff88';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SURVIVOR - TOP-DOWN SHOOTER', 400, 26);
}

// ── Utility ───────────────────────────────────────────────────────────────────
function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function lerpColor(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
  const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t).toString(16).padStart(2,'0');
  const g = Math.round(g1 + (g2-g1)*t).toString(16).padStart(2,'0');
  const b = Math.round(b1 + (b2-b1)*t).toString(16).padStart(2,'0');
  return '#'+r+g+b;
}

// ── Update ────────────────────────────────────────────────────────────────────
function updatePlaying(dt) {
  // Movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
  const moving = dx !== 0 || dy !== 0;
  if (moving) {
    const len = Math.sqrt(dx*dx + dy*dy);
    dx /= len; dy /= len;
    player.x = Math.max(player.radius, Math.min(800 - player.radius, player.x + dx * player.speed * dt));
    player.y = Math.max(player.radius + 40, Math.min(600 - player.radius, player.y + dy * player.speed * dt));
    player.legAnim += dt * 8;
    player.legSpeed = 1;
  } else {
    player.legSpeed = 0;
  }

  // Shooting
  fireCooldown -= dt;
  if (mouse.down && fireCooldown <= 0) {
    fireCooldown = 0.18;
    const bAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    const speed = 520;
    bullets.push({
      x: player.x + Math.cos(bAngle) * (player.radius + 10),
      y: player.y + Math.sin(bAngle) * (player.radius + 10),
      vx: Math.cos(bAngle) * speed,
      vy: Math.sin(bAngle) * speed,
      radius: 4, trail: [],
    });
  }

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.unshift({ x: b.x, y: b.y });
    if (b.trail.length > 6) b.trail.pop();
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > 820 || b.y < -20 || b.y > 620) {
      bullets.splice(i, 1);
    }
  }

  // Spawn enemies
  const lvl = LEVELS[currentLevel];
  if (enemiesSpawned < enemiesToSpawn) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnTimer = lvl.spawnRate;
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.hitFlash > 0) e.hitFlash -= dt * 3;

    // Move toward player
    const edx = player.x - e.x, edy = player.y - e.y;
    const elen = Math.sqrt(edx*edx + edy*edy);
    if (elen > 0) {
      e.x += (edx / elen) * e.speed * dt;
      e.y += (edy / elen) * e.speed * dt;
    }

    // Bullet collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (dist(bullets[j], e) < bullets[j].radius + e.radius) {
        e.hp--;
        e.hitFlash = 1.0;
        bullets.splice(j, 1);
        if (e.hp <= 0) {
          score += ENEMY_DEFS[e.type].score;
          spawnParticles(e.x, e.y, ENEMY_DEFS[e.type].color, 10);
          enemies.splice(i, 1);
          break;
        }
      }
    }

    // Player collision
    if (enemies[i] && dist(player, e) < player.radius + e.radius - 4) {
      if (player.iFrames <= 0) {
        player.hp--;
        player.iFrames = 1.5;
        flashTimer = 0.3;
        if (player.hp <= 0) {
          spawnParticles(player.x, player.y, '#00ff44', 20);
          state = STATE.GAME_OVER;
          if (score > highScore) highScore = score;
          return;
        }
      }
    }
  }

  // Invincibility frames
  if (player.iFrames > 0) player.iFrames -= dt;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Level complete check
  if (enemiesSpawned >= enemiesToSpawn && enemies.length === 0) {
    state = STATE.LEVEL_COMPLETE;
    levelSplashTimer = 2.0;
  }
}

function updateLevelComplete(dt) {
  levelSplashTimer -= dt;
  if (levelSplashTimer <= 0) {
    currentLevel++;
    if (currentLevel > 5) {
      state = STATE.VICTORY;
      if (score > highScore) highScore = score;
    } else {
      state = STATE.PLAYING;
      initLevel();
    }
  }
}

function updateMenu(dt) {
  for (const e of menuEnemies) {
    e.anim += dt * 1.5;
    e.x += Math.cos(e.angle) * e.speed * dt;
    e.y += Math.sin(e.angle) * e.speed * dt;
    // Bounce off walls
    if (e.x < 20 || e.x > 780) { e.angle = Math.PI - e.angle; e.x = Math.max(20, Math.min(780, e.x)); }
    if (e.y < 20 || e.y > 580) { e.angle = -e.angle; e.y = Math.max(20, Math.min(580, e.y)); }
    // Wander: slight random angle drift
    e.angle += (Math.random() - 0.5) * 0.1;
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, 800, 600);
  drawGrid();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawScreenFlash() {
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,0,0,${flashTimer * 0.5})`;
    ctx.fillRect(0, 0, 800, 600);
  }
}

let blinkTimer = 0;
let blinkOn = true;

function drawMenu(dt) {
  blinkTimer += dt;
  if (blinkTimer > 0.55) { blinkOn = !blinkOn; blinkTimer = 0; }

  drawBackground();

  // Draw wandering enemies (dimmed)
  ctx.globalAlpha = 0.35;
  for (const e of menuEnemies) {
    const saved = { x: player ? player.x : 400, y: player ? player.y : 300 };
    // Temporarily fake player position for eye drawing
    const fakePlayer = { x: e.x + Math.cos(e.angle) * 50, y: e.y + Math.sin(e.angle) * 50 };
    const realPlayer = player;
    player = fakePlayer;
    drawEnemy(e);
    player = realPlayer;
  }
  ctx.globalAlpha = 1;

  drawHUDMenu();

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 72px monospace';
  ctx.shadowColor = '#00ff44';
  ctx.shadowBlur = 20;
  ctx.fillText('SURVIVOR', 400, 200);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#88cc88';
  ctx.font = '20px monospace';
  ctx.fillText('TOP-DOWN SHOOTER', 400, 240);

  ctx.fillStyle = '#666';
  ctx.font = '14px monospace';
  ctx.fillText('ARROW KEYS / WASD to move  •  MOUSE to aim  •  CLICK to shoot', 400, 290);
  ctx.fillText('ESC to pause', 400, 314);

  if (blinkOn) {
    ctx.fillStyle = '#ffff44';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('CLICK TO START', 400, 380);
  }

  if (highScore > 0) {
    ctx.fillStyle = '#ff8844';
    ctx.font = '16px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, 400, 430);
  }

  // Enemy type guide
  ctx.fillStyle = '#444';
  ctx.font = '13px monospace';
  ctx.fillText('ENEMIES:', 400, 490);
  const types = [
    { name: 'GRUNT', color: '#cc2222', x: 290 },
    { name: 'CHARGER', color: '#ff8800', x: 400 },
    { name: 'TANK', color: '#8833cc', x: 520 },
  ];
  for (const t of types) {
    ctx.fillStyle = t.color;
    ctx.beginPath();
    ctx.arc(t.x, 525, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.fillText(t.name, t.x, 548);
  }
}

function drawPlaying() {
  drawBackground();

  for (const e of enemies) drawEnemy(e);
  drawParticles();
  for (const b of bullets) drawBullet(b);
  drawPlayer(player);
  drawScreenFlash();
  drawHUD();
}

function drawLevelComplete() {
  drawBackground();
  drawParticles();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, 800, 600);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ff44';
  ctx.shadowColor = '#00ff44';
  ctx.shadowBlur = 30;
  ctx.font = 'bold 64px monospace';
  ctx.fillText('LEVEL ' + currentLevel, 400, 260);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#88ff88';
  ctx.font = '28px monospace';
  ctx.fillText('COMPLETE!', 400, 320);
  ctx.fillStyle = '#ffff88';
  ctx.font = '20px monospace';
  ctx.fillText('SCORE: ' + score, 400, 370);
  if (currentLevel < 5) {
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '16px monospace';
    ctx.fillText('LEVEL ' + (currentLevel + 1) + ' INCOMING...', 400, 410);
  }
}

function drawGameOver() {
  drawBackground();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 800, 600);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff3344';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 25;
  ctx.font = 'bold 72px monospace';
  ctx.fillText('GAME OVER', 400, 240);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffff88';
  ctx.font = '28px monospace';
  ctx.fillText('SCORE: ' + score, 400, 310);

  ctx.fillStyle = '#ff8844';
  ctx.font = '18px monospace';
  ctx.fillText('HIGH SCORE: ' + highScore, 400, 350);

  ctx.fillStyle = '#888888';
  ctx.font = '16px monospace';
  ctx.fillText('Reached Level ' + currentLevel, 400, 390);

  if (blinkOn) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('CLICK TO RETURN TO MENU', 400, 450);
  }
}

function drawVictory() {
  drawBackground();
  ctx.fillStyle = 'rgba(0,0,20,0.7)';
  ctx.fillRect(0, 0, 800, 600);

  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffff44';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('YOU WIN!', 400, 210);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#88ff88';
  ctx.font = '22px monospace';
  ctx.fillText('All 5 levels cleared!', 400, 270);

  ctx.fillStyle = '#ffff88';
  ctx.font = '30px monospace';
  ctx.fillText('FINAL SCORE: ' + score, 400, 330);

  ctx.fillStyle = '#ff8844';
  ctx.font = '18px monospace';
  ctx.fillText('HIGH SCORE: ' + highScore, 400, 375);

  // Star decorations
  const stars = ['★','★','★','★','★'];
  ctx.fillStyle = '#ffcc00';
  ctx.font = '36px monospace';
  for (let i = 0; i < 5; i++) {
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.003 + i) * 0.5;
    ctx.fillText(stars[i], 220 + i * 90, 440);
  }
  ctx.globalAlpha = 1;

  if (blinkOn) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('CLICK TO PLAY AGAIN', 400, 510);
  }
}

function drawPaused() {
  drawPlaying();
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 800, 600);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px monospace';
  ctx.fillText('PAUSED', 400, 290);
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '18px monospace';
  ctx.fillText('Press ESC to resume', 400, 340);
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (flashTimer > 0) flashTimer -= dt;

  switch (state) {
    case STATE.MENU:
      updateMenu(dt);
      drawMenu(dt);
      break;
    case STATE.PLAYING:
      updatePlaying(dt);
      drawPlaying();
      break;
    case STATE.LEVEL_COMPLETE:
      updateLevelComplete(dt);
      drawLevelComplete();
      break;
    case STATE.GAME_OVER:
      blinkTimer += dt;
      if (blinkTimer > 0.55) { blinkOn = !blinkOn; blinkTimer = 0; }
      drawGameOver();
      break;
    case STATE.VICTORY:
      blinkTimer += dt;
      if (blinkTimer > 0.55) { blinkOn = !blinkOn; blinkTimer = 0; }
      drawVictory();
      break;
    case STATE.PAUSED:
      drawPaused();
      break;
  }

  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initMenu();
// Need a fake player for menu enemy eye-drawing
player = { x: 400, y: 300 };
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
