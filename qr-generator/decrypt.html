<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Decryption</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea, input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        textarea:focus, input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }

        .result.success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
        }

        .result.error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .result.success .result-title {
            color: #15803d;
        }

        .result.error .result-title {
            color: #991b1b;
        }

        .result-data {
            background: white;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            margin-top: 8px;
        }

        .result.success .result-data {
            color: #166534;
        }

        .result.error .result-data {
            color: #7f1d1d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Decryption</h1>
        <p class="subtitle">Scan QR code and paste encrypted data below</p>

        <form id="decryptForm">
            <div class="form-group">
                <label for="encryptedData">Encrypted Data</label>
                <textarea id="encryptedData" placeholder="Paste encrypted data here..." required></textarea>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password..." required>
            </div>

            <button type="submit">Decrypt</button>
        </form>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle">Result</div>
            <div class="result-data" id="resultData"></div>
        </div>
    </div>

    <script>
        function urlSafeBase64ToBase64(urlSafeBase64) {
            return urlSafeBase64.replace(/-/g, '+').replace(/_/g, '/');
        }

        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveBits', 'deriveKey']
            );

            return crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                baseKey,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
        }

        async function decryptData(encryptedBase64, password) {
            const standardBase64 = urlSafeBase64ToBase64(encryptedBase64);
            const binaryString = atob(standardBase64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            const salt = bytes.slice(0, 16);
            const nonce = bytes.slice(16, 28);
            const ciphertext = bytes.slice(28);

            const key = await deriveKey(password, salt);

            const plaintext = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: nonce },
                key,
                ciphertext
            );

            const dec = new TextDecoder();
            return dec.decode(plaintext);
        }

        document.getElementById('decryptForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const encryptedData = document.getElementById('encryptedData').value.trim();
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            try {
                const plaintext = await decryptData(encryptedData, password);
                const parts = plaintext.split('|').map(p => p.trim());

                resultDiv.className = 'result success';
                document.getElementById('resultTitle').textContent = 'Success';
                document.getElementById('resultData').innerHTML = `
                    <strong>Name:</strong> ${parts[0]}<br>
                    <strong>Food Restrictions:</strong> ${parts[1]}
                `;
                resultDiv.style.display = 'block';

            } catch (error) {
                resultDiv.className = 'result error';
                document.getElementById('resultTitle').textContent = 'Error';
                document.getElementById('resultData').textContent = 'Wrong password or corrupted data';
                resultDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
