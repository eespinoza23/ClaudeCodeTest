<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Decryption - Debug</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #2d2d2d;
            color: #d4d4d4;
            border: 1px solid #444;
            padding: 10px;
            font-family: monospace;
            margin: 10px 0;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .info { color: #9cdcfe; }
        pre {
            background: #2d2d2d;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h2>QR Code Decryption (Debug)</h2>
    
    <div>
        <label>Encrypted Data:</label>
        <textarea id="encryptedData" placeholder="Paste encrypted data..."></textarea>
    </div>

    <div>
        <label>Password:</label>
        <input type="password" id="password" value="Canada..2026" style="width: 100%; padding: 10px;">
    </div>

    <button onclick="testDecrypt()">Test Decrypt</button>

    <h3>Output:</h3>
    <pre id="output"></pre>

    <script>
        function log(msg, type = 'info') {
            const output = document.getElementById('output');
            const color = { success: '#4ec9b0', error: '#f48771', info: '#9cdcfe' }[type] || '#d4d4d4';
            output.innerHTML += `<span style="color: ${color}">${msg}</span>\n`;
            console.log(msg);
        }

        function urlSafeBase64ToBase64(urlSafeBase64) {
            // Convert URL-safe base64 to standard base64
            return urlSafeBase64.replace(/-/g, '+').replace(/_/g, '/');
        }

        async function testDecrypt() {
            document.getElementById('output').innerHTML = '';
            const encryptedData = document.getElementById('encryptedData').value.trim();
            const password = document.getElementById('password').value;

            log('Starting decryption...', 'info');
            log(`Encrypted data length: ${encryptedData.length}`, 'info');
            log(`Password: ${password}`, 'info');

            try {
                // Convert URL-safe base64 to standard base64
                log('Converting URL-safe base64 to standard base64...', 'info');
                const standardBase64 = urlSafeBase64ToBase64(encryptedData);
                
                // Decode base64
                log('Decoding base64...', 'info');
                const binaryString = atob(standardBase64);
                log(`Binary string length: ${binaryString.length}`, 'info');

                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Extract components
                const salt = bytes.slice(0, 16);
                const nonce = bytes.slice(16, 28);
                const ciphertext = bytes.slice(28);

                log(`Salt length: ${salt.length}`, 'info');
                log(`Nonce length: ${nonce.length}`, 'info');
                log(`Ciphertext length: ${ciphertext.length}`, 'info');

                // Derive key
                log('Deriving key with PBKDF2...', 'info');
                const enc = new TextEncoder();
                const baseKey = await crypto.subtle.importKey(
                    'raw',
                    enc.encode(password),
                    { name: 'PBKDF2' },
                    false,
                    ['deriveBits', 'deriveKey']
                );

                const key = await crypto.subtle.deriveKey(
                    {
                        name: 'PBKDF2',
                        salt: salt,
                        iterations: 100000,
                        hash: 'SHA-256'
                    },
                    baseKey,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['decrypt']
                );
                log('Key derived successfully', 'success');

                // Decrypt
                log('Decrypting with AES-GCM...', 'info');
                const plaintext = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: nonce },
                    key,
                    ciphertext
                );

                const dec = new TextDecoder();
                const result = dec.decode(plaintext);
                log(`DECRYPTION SUCCESS: ${result}`, 'success');

            } catch (error) {
                log(`ERROR: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
            }
        }
    </script>
</body>
</html>
